<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GokuSenseiZ | Secure Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Plus+Jakarta+Sans:wght@200;800&display=swap" rel="stylesheet">

<style>
        :root {
            --bg: #030303;
            --accent: #ffffff;
            --dim: #444444;
            --glow-color: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- BACKGROUND PARTICULES --- */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* --- LOGO ANIMÉ ELITE --- */
        .logo-box {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 50px;
        }

        .logo-ring {
            position: absolute;
            inset: 0;
            border: 1px solid var(--dim);
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            animation: morph 8s infinite linear alternate;
        }

        .logo-ring.inner {
            inset: 10px;
            border-color: var(--accent);
            animation: morph 6s infinite linear alternate-reverse;
            box-shadow: 0 0 20px var(--glow-color);
        }

        .logo-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -2px;
        }

        @keyframes morph {
            0% { border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%; transform: rotate(0deg); }
            100% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; transform: rotate(180deg); }
        }

        /* --- TYPOGRAPHIE --- */
        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin-bottom: 15px;
            color: var(--accent);
            opacity: 0.8;
        }

        #dynamic-text {
            height: 20px;
            font-size: 0.75rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            transition: opacity 0.5s ease;
        }

        /* --- BARRE DE CHARGEMENT --- */
        .progress-container {
            width: 240px;
            height: 2px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            background-size: 200% 100%;
            animation: loading 3.5s cubic-bezier(0.85, 0, 0.15, 1) forwards;
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

</style>
  </head>
  <body>

    <div id="particles-js"></div>

    <div class="content-wrapper">
   <div class="logo-box">
  <div class="logo-ring"></div>
  <div class="logo-ring inner"></div>
  <div class="logo-text">GZ</div>
   </div>

   <div class="brand">GokuSenseiZ</div>

   <div id="dynamic-text">Initialisation...</div>
 <div class="progress-container">
  <div class="progress-bar"></div>
   </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
        // 1. TA LISTE DE TEXTES (Data JSON-like)
        const loadingMessages = [
            "Établissement d'une connexion sécurisée",
            "Chiffrement des données de transaction"
        ];

        // 2. FONCTION POUR CHANGER LE TEXTE ALÉATOIREMENT
        function setRandomText() {
            const textElement = document.getElementById('dynamic-text');
            const randomIndex = Math.floor(Math.random() * loadingMessages.length);
            textElement.innerText = loadingMessages[randomIndex];
        }

        // Appliquer un texte dès le début
        setRandomText();

        // 3. CONFIGURATION PARTICULES (Effet de fond)
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2, "random": true },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 1, "direction": "top", "random": true, "straight": false, "out_mode": "out" }
            }
        });

        // 4. REDIRECTION
        setTimeout(() => {
            // Remplace par le lien de ta page d'accueil
            window.location.href = "https://test.gokusensi.com"; 
        }, 4000);
</script>
  </body>
</html>
