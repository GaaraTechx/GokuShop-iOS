<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GokuSenseiZ | Erreur de connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #ffffff;
            --text-secondary: #636366;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 375px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* --- SVG PROFESSIONNEL --- */
        .illustration {
            width: 180px;
            height: 180px;
            margin-bottom: 40px;
        }

        .icon-path {
            fill: none;
            stroke: var(--accent);
            stroke-width: 1.2;
            stroke-linecap: round;
        }

        .bolt-path {
            fill: var(--accent);
            animation: pulseBolt 2s infinite ease-in-out;
        }

        @keyframes pulseBolt {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 5px #fff); }
            50% { opacity: 0.3; }
        }

        /* --- TEXTES --- */
        h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 60px;
        }

        /* --- BOUTON TYPE APP --- */
        .btn-retry {
            width: 100%;
            background: var(--accent);
            color: black;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.2s cubic-bezier(0.1, 0.5, 0.1, 1);
        }

        .btn-retry:active {
            transform: scale(0.95);
        }

        /* --- LOADER --- */
        .loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.1);
            border-top: 2px solid black;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-info {
            margin-top: 30px;
            font-size: 10px;
            font-weight: 700;
            color: #1c1c1e;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
</style>
  </head>
  <body>

    <div class="app-container">

   <svg class="illustration" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="95" fill="#050505" stroke="#111" stroke-width="1" />
  <path class="icon-path" d="M70 130a45 45 0 0 1 60 0M55 115a65 65 0 0 1 90 0M40 100a90 90 0 0 1 120 0" opacity="0.2"/>
  <path class="bolt-path" d="M105 70l-15 30h12l-10 30 25-40h-12l10-20z" />
  <line x1="50" y1="150" x2="150" y2="50" stroke="white" stroke-width="3" stroke-linecap="round" />
   </svg>
   <h1>Connexion perdue</h1>
   <p>Une erreur réseau est survenue. Vérifiez vos réglages internet pour continuer vos achats.</p>

   <button class="btn-retry" id="retryBtn">
  <span class="loader" id="spinner"></span>
  <span id="label">Réessayer</span>
   </button>

   <div class="footer-info">GOKUSENSEIZ</div>
    </div>

<script>
        const btn = document.getElementById('retryBtn');
        const spinner = document.getElementById('spinner');
        const label = document.getElementById('label');

        btn.addEventListener('click', function() {
            // Animation du bouton
            label.innerText = "Recherche...";
            spinner.style.display = "block";
            btn.style.pointerEvents = "none";

            // Tentative de redirection vers Gokusensei.com
            setTimeout(() => {
                // Redirection vers l'URL
                window.location.href = "https://test.gokusensi.com";
                
                // Si la redirection échoue (toujours pas d'internet), on reset après 3s
                setTimeout(() => {
                    label.innerText = "Réessayer";
                    spinner.style.display = "none";
                    btn.style.pointerEvents = "auto";
                }, 3000);
            }, 1500);
        });
</script>
  </body>
</html>
